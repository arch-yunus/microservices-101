version: '3.8'

services:
  # ?? Jaeger: İzleme (Tracing)
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: micro_jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - micro_network

  # ?? API Gateway: Sistemin Zırhlı Kapısı
  gateway-service:
    build:
      context: ./services/gateway-service
    container_name: micro_gateway
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    networks:
      - micro_network

  # ?? Product Service
  product-service:
    build:
      context: ./services/product-service
    container_name: micro_product
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    healthcheck:
      test: ["CMD", "/usr/bin/grpc_health_probe", "-addr=:50051"]
      interval: 5s
      timeout: 2s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - micro_network

  # ?? Order Service
  order-service:
    build:
      context: ./services/order-service
    container_name: micro_order
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    healthcheck:
      test: ["CMD", "/usr/bin/grpc_health_probe", "-addr=:50052"]
      interval: 5s
      timeout: 2s
      retries: 10
    depends_on:
      product-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - micro_network

  # ?? Notifier Service (Bildirim Merkezi - Asenkron)
  notifier-service:
    build:
      context: ./services/notifier-service
    container_name: micro_notifier
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - micro_network

  # ?? Veritaban: PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: micro_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: micro_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d micro_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - micro_network

  # ?? Mesaj Kuyruu: RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: micro_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - micro_network

  # ?? Cache Katman: Redis
  redis:
    image: redis:7-alpine
    container_name: micro_redis
    ports:
      - "6379:6379"
    networks:
      - micro_network

networks:
  micro_network:
    driver: bridge

volumes:
  pgdata:

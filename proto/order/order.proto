syntax = "proto3";

package order;

option go_package = "github.com/arch-yunus/microservices-101/proto/order";

service OrderService {
  rpc CreateOrder(CreateOrderRequest) returns (OrderResponse);
  rpc GetOrder(GetOrderRequest) returns (OrderResponse);
}

message CreateOrderRequest {
  string product_id = 1;
  int32 quantity = 2;
}

message GetOrderRequest {
  string order_id = 1;
}

message OrderResponse {
  string id = 1;
  string product_id = 2;
  int32 quantity = 3;
  double total_price = 4;
  string status = 5;
  string created_at = 6;
}
